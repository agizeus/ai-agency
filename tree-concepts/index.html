  <figcaption>Ein Hybrid-Baum in einer hellen, freundlichen Landschaft: Die untere Hälfte ist ein klassischer Baum mit Stamm, voller grüner Krone und Wiese, in der Farbwelt des Bridgerton-Intros (weicher, warmer Himmel, leicht pastellige Töne). Im oberen Drittel der Baumkrone verwandeln sich die Blätter nach und nach in vertikale Streifen aus Pixeln und Quadraten, die nach oben aufsteigen, als würde der obere Teil des Baums ‚hochgeladen‘. Die Pixel beginnen in sattem Grün und gehen fließend in ein helles Weiß über, ohne orange oder apricotfarbene Akzente. Hintergrund weich türkis/blau. Keine Schrift, kein Text. Illustrativer, hochauflösender Stil, geeignet als Website-Hero.</figcaption>
