<h1>openai-image-gen</h1>
<p>Output: <code>ai-agency-website/bot-avatars-sol-triptych</code></p>
<div class="grid">
<figure>
  <a href="001-drei-stilistische-varianten-des-gleichen.png"><img src="001-drei-stilistische-varianten-des-gleichen.png" loading="lazy" /></a>
  <figcaption>Drei stilistische Varianten des gleichen Avatars in EINEM Bild, nebeneinander wie ein Triptych, im Verhältnis 1:1:1. Thema: Sol, virtueller Kundenservice- und Support-Assistent. 

Links: malerische, leicht Bridgerton-inspirierte Version einer jungen Person im kühlen, weichen Licht, organischer Illustrationsstil, blau-grünliche Kleidung, im Hintergrund angedeutete Natur. 

Mitte: dieselbe Figur im modernen SaaS-Illustrationsstil mit klaren Flächen und leicht geometrischen Formen, ruhig und vertrauenswürdig, mit Headset oder Chat-Bubble-Symbol. Farbwelt: kühles Blau und Türkis als Akzentfarben, neutraler Hintergrund, der zum Baum-Hero passt (weicher türkiser/hellblauer Ton). Dezente Pixel- oder Datenakzente im Hintergrund. 

Rechts: reduzierte, ikonische Darstellung derselben Figur als simples Flat-Icon (Kopf/Schultern in Blau/Türkis), daneben ein kleines Symbol für Support (z. B. Chat-Bubble oder Häkchen-Icon). Keine Schrift, keine Logos, nur diese drei Panels nebeneinander.</figcaption>
</figure>
