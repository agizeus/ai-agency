<!doctype html>
<meta charset="utf-8" />
<title>openai-image-gen</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 24px; font: 14px/1.4 ui-sans-serif, system-ui; background: #0b0f14; color: #e8edf2; }
  h1 { font-size: 18px; margin: 0 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  figure { margin: 0; padding: 12px; border: 1px solid #1e2a36; border-radius: 14px; background: #0f1620; }
  img { width: 100%; height: auto; border-radius: 10px; display: block; }
  figcaption { margin-top: 10px; color: #b7c2cc; }
  code { color: #9cd1ff; }
</style>
<h1>openai-image-gen</h1>
<p>Output: <code>ai-agency-website/bot-avatars-triptych</code></p>
<div class="grid">
<figure>
  <a href="001-drei-stilistische-varianten-des-gleichen.png"><img src="001-drei-stilistische-varianten-des-gleichen.png" loading="lazy" /></a>
  <figcaption>Drei stilistische Varianten des gleichen Avatars in EINEM Bild, nebeneinander wie ein Triptych, im Verhältnis 1:1:1. Links: eine malerische, leicht Bridgerton-inspirierte Version einer jungen Frau vor einem Baum (weiches Licht, organischer Illustrationsstil, grünliche Kleidung). Mitte: dieselbe Figur im modernen SaaS-Illustrationsstil mit klaren Flächen und leicht geometrischen Formen, freundlich und professionell, mit Tablet in der Hand, dezente Pixel im Hintergrund. Rechts: eine reduzierte, ikonische Darstellung derselben Figur als simples Flat-Icon (Kopf/Schultern in Grün, daneben ein kleines Kalender- oder Notiz-Icon). Kein Text, keine Logos, nur diese drei Panels nebeneinander.</figcaption>
</figure>
</div>
